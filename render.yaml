# render.yaml
services:
  # PostgreSQL Database
  - type: pserv
    name: blog-db
    env: postgres
    postgres:
      version: 15
    disk:
      name: postgres-data
      sizeGB: 1
      mountPath: /var/lib/postgresql/data

  # Rust Backend
  - type: web
    name: blog-backend
    env: docker
    repo: https://github.com/weirdo-lyx/my_blog.git
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: blog-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: RUST_LOG
        value: info

  # Vue.js Frontend
  - type: static_site
    name: blog-frontend
    env: static
    repo: https://github.com/weirdo-lyx/my_blog.git
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blog-backend
          property: url