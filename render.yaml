services:
  # Rust Backend
  - type: web
    name: blog-backend
    runtime: docker
    repo: https://github.com/weirdo-lyx/my_blog.git
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: RUST_LOG
        value: info

  # Vue.js Frontend
  - type: web
    name: blog-frontend
    runtime: static
    repo: https://github.com/weirdo-lyx/my_blog.git
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blog-backend
          property: url

databases:
  - name: blog-db
    plan: free
